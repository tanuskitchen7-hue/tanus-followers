<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanu's Kitchen Live Followers</title>
  <style>
    :root {
      --brand-red: #fd2a08;
      --brand-dark: #930400;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--brand-red);
      font-family: Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: min(100vw, 56.25vh);
      height: min(177.78vw, 100vh);
      aspect-ratio: 9 / 16;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 28%),
        linear-gradient(180deg, #b5211a 0%, #fd2a08 45%, #930400 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 18px 28px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.25);
    }

    .logo {
      width: 82%;
      max-width: 420px;
      height: auto;
      object-fit: contain;
      margin-top: 4px;
    }

    .headline {
      margin-top: 6px;
      font-size: clamp(22px, 3.4vh, 34px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .counter-box {
      width: 100%;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 28px;
      padding: 22px 16px 26px;
      backdrop-filter: blur(4px);
    }

    .label {
      font-size: clamp(18px, 2.8vh, 30px);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .count {
      font-size: clamp(54px, 8.2vh, 96px);
      font-weight: 800;
      line-height: 1;
      word-break: break-word;
      margin: 0;
    }

    .sub {
      margin-top: 14px;
      font-size: clamp(15px, 2.2vh, 22px);
      opacity: 0.95;
    }

    .handle {
      font-size: clamp(22px, 3vh, 32px);
      font-weight: 700;
      line-height: 1.2;
      margin-top: 14px;
    }

    .footer {
      font-size: clamp(14px, 2vh, 20px);
      opacity: 0.9;
      margin-top: 10px;
    }
  </style>
</head>

    <div class="counter-box">
      <div class="label">Instagram Live Followers</div>
      <p class="count" id="followers">Loading...</p>
      <div class="sub">Refreshes every 15 seconds</div>
    </div>

    <div class="handle">@tanus_kitchen_southall</div>
    <div class="footer">Tanu's Kitchen</div>
  </div>

  <script>
    async function updateFollowers() {
      const el = document.getElementById("followers");
      try {
        const res = await fetch("https://api.allorigins.win/raw?url=https://livecounts.io/instagram-live-follower-counter/tanus_kitchen_southall");
        const text = await res.text();
        const match = text.match(/"followerCount":(\d+)/);

        if (match) {
          el.textContent = Number(match[1]).toLocaleString();
        } else {
          el.textContent = "Unavailable";
        }
      } catch (error) {
        el.textContent = "Unavailable";
      }
    }

    updateFollowers();
    setInterval(updateFollowers, 15000);
  </script>
